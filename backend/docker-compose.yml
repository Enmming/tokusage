services:
  postgres:
    image: postgres:17-alpine
    container_name: tokusage-postgres
    environment:
      POSTGRES_USER: tokusage
      POSTGRES_PASSWORD: tokusage
      POSTGRES_DB: tokusage
    ports:
      - "5432:5432"
    volumes:
      - tokusage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokusage"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: tokusage-api
    environment:
      TOKUSAGE_DATABASE_URL: postgresql+asyncpg://tokusage:tokusage@postgres:5432/tokusage
      TOKUSAGE_VALID_TOKENS: "devtoken,demotoken"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  tokusage_pgdata:
